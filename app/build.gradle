plugins {
    id 'com.android.application'
}

android {
    namespace 'com.sw.wavetype'
    compileSdk 35

    defaultConfig {
        applicationId 'com.sw.wavetype'
        minSdk 23
        targetSdk 35
        versionCode 3
        versionName '0.1.2'
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}
